<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Graded Reader — Svenska CI</title>
<link rel="stylesheet" href="shared.css" />
<style>
  .level-tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .level-tab {
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
  }
  .level-tab.active {
    background: linear-gradient(135deg, var(--blue), var(--green));
    color: #06121a;
    border-color: transparent;
  }
  .level-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .story-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .story-card {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .story-card .sc-title {
    font-weight: 700;
    font-size: 1.02rem;
  }
  .story-card .sc-title-en {
    color: var(--text-dim);
    font-size: 0.82rem;
  }
  .story-card .sc-meta {
    margin-top: 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .reading-progress {
    position: sticky;
    top: 0;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .reading-progress .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    width: 0%;
    transition: width 0.2s ease;
  }
  #view-list, #view-story, #view-questions { display: none; }
  #view-list.active, #view-story.active, #view-questions.active {
    display: block;
    animation: view-fade-in 0.35s ease;
  }
  @keyframes view-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    #view-list.active, #view-story.active, #view-questions.active { animation: none; }
  }
  .q-block { margin-bottom: 22px; }
  .q-options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .q-option {
    text-align: left;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    cursor: pointer;
    font-size: 0.95rem;
  }
  .q-option:hover { background: rgba(255,255,255,0.09); }
  .q-option.selected { border-color: var(--blue); }
  .q-option.correct { border-color: var(--green); background: rgba(111,207,151,0.15); }
  .q-option.incorrect { border-color: var(--pink); background: rgba(226,120,158,0.15); }
  .placeholder-note {
    color: var(--text-faint);
    font-size: 0.85rem;
    text-align: center;
    padding: 30px 0;
  }
  @media (max-width: 480px) {
    #view-story > .flex, #questions-card .flex {
      flex-direction: column;
      align-items: stretch;
    }
    #view-story > .flex button, #questions-card .flex button {
      width: 100%;
    }
    .level-tab { font-size: 0.8rem; padding: 8px 12px; }
  }
</style>
</head>
<body>

<div class="page" id="page-root">
  <div id="header-slot"></div>

  <!-- ===================== Story list view ===================== -->
  <div id="view-list" class="active">
    <div class="level-tabs" id="level-tabs"></div>
    <div class="story-list" id="story-list"></div>
  </div>

  <!-- ===================== Reading view ===================== -->
  <div id="view-story">
    <div class="reading-progress"><div class="fill" id="reading-fill"></div></div>
    <div class="card">
      <div class="flex justify-between items-center" style="gap:12px; flex-wrap:wrap;">
        <h2 id="story-title" style="margin:0;">—</h2>
        <button class="btn" id="btn-read-aloud" data-playing="0">🔊 Läs hela texten</button>
      </div>
      <div class="text-dim" id="story-title-en" style="margin-bottom:14px;"></div>
      <div class="story-text" id="story-text"></div>
      <div class="text-dim" style="font-size:0.85rem; margin-top:10px;">Klicka på en mening för att höra den.</div>
    </div>
    <div class="flex justify-between" style="margin-top:4px;">
      <button class="btn" id="btn-back-to-list">← Till listan</button>
      <button class="btn btn-primary" id="btn-to-questions">Till frågorna →</button>
    </div>
  </div>

  <!-- ===================== Questions view ===================== -->
  <div id="view-questions">
    <div class="card" id="questions-card">
      <div class="placeholder-note">Frågor laddas…</div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script src="data/stories-a2.js"></script>
<script src="data/stories-a2-high.js"></script>
<script src="data/stories-b1.js"></script>
<script>
auroraBackground();

const LEVELS = [
  { key: "A2-low", label: "A2-låg", get: () => (typeof STORIES_A2_LOW !== "undefined" ? STORIES_A2_LOW : []) },
  { key: "A2-high", label: "A2-hög", get: () => (typeof STORIES_A2_HIGH !== "undefined" ? STORIES_A2_HIGH : []) },
  { key: "B1", label: "B1", get: () => (typeof STORIES_B1 !== "undefined" ? STORIES_B1 : []) },
  { key: "B1+", label: "B1+", get: () => (typeof STORIES_B1_PLUS !== "undefined" ? STORIES_B1_PLUS : []) },
];

let currentLevel = Store.get("reader.lastLevel", LEVELS[0].key);
let currentStory = null;

document.getElementById("header-slot").appendChild(
  gameHeader({
    title: "📖 Graded Reader",
    subtitle: "Läs och förstå — ingen ordboksjakt",
    backHref: "index.html",
  })
);

function showView(id) {
  for (const v of ["view-list", "view-story", "view-questions"]) {
    document.getElementById(v).classList.toggle("active", v === id);
  }
}

function isStoryDone(storyId) {
  return !!Store.get(`reader.progress.${storyId}.completed`, false);
}

function countDone(stories) {
  return stories.filter((s) => isStoryDone(s.id)).length;
}

function renderLevelTabs() {
  const host = document.getElementById("level-tabs");
  host.innerHTML = "";
  for (const lvl of LEVELS) {
    const stories = lvl.get();
    const done = countDone(stories);
    const label = stories.length
      ? `${lvl.label} (${done}/${stories.length})`
      : `${lvl.label} (snart)`;
    const btn = el(
      "button",
      {
        class: "level-tab" + (lvl.key === currentLevel ? " active" : ""),
        disabled: stories.length === 0 ? "disabled" : undefined,
        onclick: () => {
          if (stories.length === 0) {
            toast(`${lvl.label} kommer snart`);
            return;
          }
          currentLevel = lvl.key;
          Store.set("reader.lastLevel", currentLevel);
          renderLevelTabs();
          renderStoryList();
        },
      },
      [label]
    );
    host.appendChild(btn);
  }
}

function renderStoryList() {
  const host = document.getElementById("story-list");
  host.innerHTML = "";
  const lvl = LEVELS.find((l) => l.key === currentLevel) || LEVELS[0];
  const stories = lvl.get();
  if (stories.length === 0) {
    host.appendChild(el("div", { class: "placeholder-note" }, ["Inga berättelser ännu på den här nivån."]));
    return;
  }
  for (const story of stories) {
    const done = isStoryDone(story.id);
    const card = el(
      "div",
      { class: "card story-card", onclick: () => openStory(story) },
      [
        el("div", { class: "sc-title" }, [(done ? "✅ " : "") + story.title]),
        el("div", { class: "sc-title-en" }, [story.titleEn]),
        el("div", { class: "sc-meta" }, [
          el("span", { class: "badge" }, [story.theme]),
          el("span", { class: "badge" }, [`${story.wordCount} ord`]),
        ]),
      ]
    );
    host.appendChild(card);
  }
}

function openStory(story) {
  stopReadAloud();
  currentStory = story;
  document.getElementById("story-title").textContent = story.title;
  document.getElementById("story-title-en").textContent = story.titleEn;
  renderGlossedText(document.getElementById("story-text"), story.text, story.glossary, story.id);
  showView("view-story");
  window.scrollTo({ top: 0, behavior: "instant" });
  updateReadingProgress();
}

/* ---------------- Comprehension questions ---------------- */
let qState = { story: null, index: 0, score: 0, answered: false };

function startQuestions(story) {
  qState = { story, index: 0, score: 0, answered: false };
  window.scrollTo({ top: 0, behavior: "instant" });
  renderQuestion();
}

function renderQuestion() {
  const card = document.getElementById("questions-card");
  card.innerHTML = "";
  const { story, index } = qState;
  const total = story.questions.length;
  const q = story.questions[index];
  qState.answered = false;

  card.appendChild(
    el("div", { class: "text-faint", style: "margin-bottom:10px;font-size:0.85rem;" }, [
      `Fråga ${index + 1} av ${total}`,
    ])
  );
  card.appendChild(
    el("div", { class: "progress-track", style: "margin-bottom:18px;" }, [
      el("div", { class: "progress-fill", style: `width:${(index / total) * 100}%` }),
    ])
  );

  const block = el("div", { class: "q-block" }, [
    el("h3", {}, [q.q]),
    el("div", { class: "text-dim", style: "font-size:0.85rem;margin-top:-6px;" }, [q.qEn]),
  ]);
  const optionsHost = el("div", { class: "q-options" });
  q.options.forEach((opt, i) => {
    const optBtn = el("button", { class: "q-option" }, [opt]);
    optBtn.addEventListener("click", () => selectAnswer(i, q, optionsHost, optBtn));
    optionsHost.appendChild(optBtn);
  });
  block.appendChild(optionsHost);
  card.appendChild(block);

  const nextBtn = el(
    "button",
    { class: "btn btn-primary", id: "btn-next-question", disabled: "disabled" },
    [index + 1 < total ? "Nästa fråga →" : "Se resultat →"]
  );
  nextBtn.addEventListener("click", () => {
    if (!qState.answered) return;
    qState.index += 1;
    if (qState.index < total) {
      renderQuestion();
    } else {
      finishQuestions();
    }
  });
  card.appendChild(el("div", { style: "margin-top:18px;text-align:right;" }, [nextBtn]));
}

function selectAnswer(choiceIndex, q, optionsHost, chosenBtn) {
  if (qState.answered) return;
  qState.answered = true;
  const correct = choiceIndex === q.correct;
  if (correct) qState.score += 1;

  Array.from(optionsHost.children).forEach((btn, i) => {
    if (i === q.correct) btn.classList.add("correct");
    if (i === choiceIndex && !correct) btn.classList.add("incorrect");
  });
  chosenBtn.classList.add("selected");
  if (correct) Sfx.correct();
  else Sfx.incorrect();

  optionsHost.appendChild(
    el("div", { class: correct ? "text-dim" : "badge pink", style: "margin-top:12px;font-size:0.85rem;" }, [
      correct ? "✓ Rätt!" : `Rätt svar: ${q.options[q.correct]}`,
    ])
  );

  document.getElementById("btn-next-question").removeAttribute("disabled");
}

function finishQuestions() {
  const { story, score } = qState;
  const total = story.questions.length;
  const pct = Math.round((score / total) * 100);
  const passed = pct >= 60;

  const prevBest = Store.get(`reader.progress.${story.id}.bestScore`, 0);
  Store.update(`reader.progress.${story.id}`, (entry) => {
    entry = entry || { attempts: 0, bestScore: 0, completed: false };
    entry.attempts += 1;
    entry.lastScore = pct;
    entry.bestScore = Math.max(entry.bestScore, pct);
    entry.completed = entry.completed || passed;
    return entry;
  });
  Store.update("stats.readingSessions", (n) => (n || 0) + 1, 0);

  const card = document.getElementById("questions-card");
  card.innerHTML = "";
  const resultCard = el("div", { class: "text-center" }, [
    el("div", { style: "font-size:2.4rem;" }, [passed ? "🎉" : "📖"]),
    el("h2", {}, [`${score} / ${total} rätt`]),
    el("div", { class: "text-dim" }, [
      passed
        ? "Bra jobbat! Du har förstått texten."
        : "Läs gärna texten igen — du blir bättre för varje gång.",
    ]),
    pct > prevBest
      ? el("div", { class: "badge gold", style: "margin-top:10px;" }, ["Nytt personligt bästa!"])
      : null,
  ]);
  card.appendChild(resultCard);
  if (passed) celebrate(card);

  const lvl = LEVELS.find((l) => l.key === story.level) || LEVELS.find((l) => l.key === currentLevel);
  const levelStories = lvl ? lvl.get() : [];
  const storyIdx = levelStories.findIndex((s) => s.id === story.id);
  const nextStory = storyIdx >= 0 ? levelStories[storyIdx + 1] : null;
  const levelComplete = levelStories.length > 0 && countDone(levelStories) === levelStories.length;

  if (levelComplete) {
    const levelBadge = el("div", { class: "badge green", style: "margin-top:6px;" }, [`🏅 Hela nivån ${lvl.label} är klar!`]);
    card.appendChild(levelBadge);
    toast(`🏅 Hela nivån ${lvl.label} är klar!`);
    setTimeout(() => celebrate(levelBadge), 250);
  }

  const actions = el("div", { class: "flex gap-12 justify-between", style: "margin-top:22px;flex-wrap:wrap;" }, [
    el("button", { class: "btn", onclick: () => { openStory(story); } }, ["← Läs igen"]),
    nextStory
      ? el("button", { class: "btn btn-gold", onclick: () => { openStory(nextStory); } }, ["Nästa berättelse →"])
      : null,
    el(
      "button",
      {
        class: "btn btn-primary",
        onclick: () => {
          showView("view-list");
          renderLevelTabs();
          renderStoryList();
        },
      },
      ["Till listan"]
    ),
  ]);
  card.appendChild(actions);
}

/* ---------------- Glossed text rendering ----------------
   Only glossary-listed words/phrases become tappable (CI principle:
   gloss the unfamiliar, leave known words clean). Tap = translation +
   spoken pronunciation; hover previews the translation. */
const WORD_RE = /[A-Za-zÅÄÖÉåäöé]+/g;

// Split into sentences (kept together with trailing punctuation + whitespace)
// so each one can be wrapped in a clickable "play this sentence" span.
const SENTENCE_RE = /[^.!?]+[.!?]*(\s+|$)/g;

function renderGlossedText(container, text, glossary, contextId) {
  container.innerHTML = "";
  const singleWordMap = new Map();
  const phrases = [];
  for (const key of Object.keys(glossary)) {
    if (key.includes(" ")) phrases.push({ key: key.toLowerCase(), original: key });
    else singleWordMap.set(key.toLowerCase(), key);
  }
  phrases.sort((a, b) => b.key.length - a.key.length);

  const sentences = text.match(SENTENCE_RE) || [text];
  for (const sentence of sentences) {
    const trimmed = sentence.trim();
    if (!trimmed) {
      container.appendChild(document.createTextNode(sentence));
      continue;
    }
    const span = el("span", { class: "story-sentence" }, []);
    appendGlossedTokens(span, sentence, singleWordMap, phrases, glossary, contextId);
    span.addEventListener("click", (e) => {
      e.stopPropagation();
      playSentence(span, trimmed);
    });
    container.appendChild(span);
  }
}

// Try to match a glossary phrase of 2+ words starting at tokens[i] (word,
// single space, word, single space, word, ...). Tries the longest known
// phrase length first so e.g. a 3-word phrase wins over a 2-word prefix of it.
function matchPhraseAt(tokens, i, phrases, maxWords) {
  for (let wordCount = maxWords; wordCount >= 2; wordCount--) {
    const words = [tokens[i].text];
    let idx = i + 1;
    let valid = true;
    for (let w = 1; w < wordCount; w++) {
      const gapTok = tokens[idx];
      const wordTok = tokens[idx + 1];
      if (!gapTok || gapTok.type !== "gap" || gapTok.text !== " " || !wordTok || wordTok.type !== "word") {
        valid = false;
        break;
      }
      words.push(wordTok.text);
      idx += 2;
    }
    if (!valid) continue;
    const candidate = words.join(" ").toLowerCase();
    const phraseHit = phrases.find((p) => p.key === candidate);
    if (phraseHit) return { phraseHit, endIndex: idx - 1, display: words.join(" ") };
  }
  return null;
}

function appendGlossedTokens(container, text, singleWordMap, phrases, glossary, contextId) {
  const tokens = [];
  let lastIndex = 0;
  let match;
  WORD_RE.lastIndex = 0;
  while ((match = WORD_RE.exec(text))) {
    if (match.index > lastIndex) tokens.push({ type: "gap", text: text.slice(lastIndex, match.index) });
    tokens.push({ type: "word", text: match[0] });
    lastIndex = WORD_RE.lastIndex;
  }
  if (lastIndex < text.length) tokens.push({ type: "gap", text: text.slice(lastIndex) });

  const maxPhraseWords = phrases.length ? Math.max(...phrases.map((p) => p.key.split(" ").length)) : 0;

  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    if (tok.type === "gap") {
      container.appendChild(document.createTextNode(tok.text));
      continue;
    }
    if (maxPhraseWords >= 2) {
      const m = matchPhraseAt(tokens, i, phrases, maxPhraseWords);
      if (m) {
        container.appendChild(makeGlossSpan(m.display, m.phraseHit.key, glossary[m.phraseHit.original], contextId));
        i = m.endIndex;
        continue;
      }
    }
    const lower = tok.text.toLowerCase();
    if (singleWordMap.has(lower)) {
      const originalKey = singleWordMap.get(lower);
      container.appendChild(makeGlossSpan(tok.text, lower, glossary[originalKey], contextId));
    } else {
      container.appendChild(document.createTextNode(tok.text));
    }
  }
}

let activeTooltipAnchor = null;
let tooltipPinned = false;

function showGlossTooltip(anchor, text) {
  if (activeTooltipAnchor === anchor) return;
  removeTooltip();
  anchor.classList.add("active");
  anchor.appendChild(el("div", { class: "gloss-tooltip" }, [text]));
  activeTooltipAnchor = anchor;
}

function removeTooltip() {
  if (!activeTooltipAnchor) return;
  activeTooltipAnchor.classList.remove("active");
  const tip = activeTooltipAnchor.querySelector(".gloss-tooltip");
  if (tip) tip.remove();
  activeTooltipAnchor = null;
  tooltipPinned = false;
}

document.addEventListener("click", () => removeTooltip());

function makeGlossSpan(displayText, glossKey, gloss, contextId) {
  const span = el("span", { class: "gloss-word", tabindex: "0" }, [displayText]);
  if (Words.get(glossKey).count > 0) span.classList.add("encountered");

  span.addEventListener("mouseenter", () => {
    if (!tooltipPinned) showGlossTooltip(span, gloss);
  });
  span.addEventListener("mouseleave", () => {
    if (!tooltipPinned && activeTooltipAnchor === span) removeTooltip();
  });
  span.addEventListener("click", (e) => {
    e.stopPropagation();
    showGlossTooltip(span, gloss);
    tooltipPinned = true;
    Speech.say(displayText, { rate: 0.85 });
  });
  span.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      showGlossTooltip(span, gloss);
      tooltipPinned = true;
      Speech.say(displayText, { rate: 0.85 });
    }
  });
  return span;
}

document.getElementById("btn-back-to-list").addEventListener("click", () => {
  stopReadAloud();
  showView("view-list");
  renderLevelTabs();
  renderStoryList();
});

document.getElementById("btn-to-questions").addEventListener("click", () => {
  stopReadAloud();
  recordStoryEncounters(currentStory);
  showView("view-questions");
  startQuestions(currentStory);
});

/* ---------------- Audio playback ----------------
   "Läs hela texten" speaks every sentence in order via the Speech helper
   (sv-SE TTS), highlighting each sentence as it plays. Tapping a single
   sentence (see renderGlossedText) plays just that one. No audio files —
   same TTS approach used for individual gloss words. */
let readAloudActive = false;
let readAloudCancelled = false;

function clearSentenceHighlight() {
  const playing = document.querySelector(".story-sentence.sentence-playing");
  if (playing) playing.classList.remove("sentence-playing");
}

function setReadAloudButtonState(playing) {
  const btn = document.getElementById("btn-read-aloud");
  if (!btn) return;
  btn.dataset.playing = playing ? "1" : "0";
  btn.textContent = playing ? "⏸ Stoppa uppläsning" : "🔊 Läs hela texten";
}

function stopReadAloud() {
  readAloudCancelled = true;
  readAloudActive = false;
  Speech.stop();
  clearSentenceHighlight();
  setReadAloudButtonState(false);
}

function playSentence(span, text) {
  stopReadAloud();
  span.classList.add("sentence-playing");
  Speech.say(text, { rate: 0.9, onend: () => span.classList.remove("sentence-playing") });
}

function readStoryAloud() {
  const sentences = Array.from(document.querySelectorAll("#story-text .story-sentence"));
  if (!sentences.length) return;
  readAloudCancelled = false;
  readAloudActive = true;
  setReadAloudButtonState(true);

  let i = 0;
  function playNext() {
    if (readAloudCancelled || i >= sentences.length) {
      readAloudActive = false;
      clearSentenceHighlight();
      setReadAloudButtonState(false);
      return;
    }
    const span = sentences[i++];
    clearSentenceHighlight();
    span.classList.add("sentence-playing");
    const text = span.textContent.trim();
    if (!text) {
      playNext();
      return;
    }
    const ok = Speech.say(text, { rate: 0.9, onend: playNext });
    if (!ok) playNext();
  }
  playNext();
}

document.getElementById("btn-read-aloud").addEventListener("click", () => {
  if (readAloudActive) {
    stopReadAloud();
  } else {
    readStoryAloud();
  }
});

/* ---------------- Word encounter tracking ----------------
   Finishing a reading pass (moving on to the comprehension check) counts
   as one encounter with every glossed word in that story — re-reading a
   story later adds further encounters, per the spaced-encounter design. */
function recordStoryEncounters(story) {
  for (const word of Object.keys(story.glossary)) {
    Words.record(word, story.id);
  }
}

// Simple scroll-based reading progress indicator.
function updateReadingProgress() {
  const storyView = document.getElementById("view-story");
  if (!storyView.classList.contains("active")) return;
  const scrollable = document.documentElement.scrollHeight - window.innerHeight;
  const pct = scrollable > 0 ? Math.min(100, Math.round((window.scrollY / scrollable) * 100)) : 100;
  document.getElementById("reading-fill").style.width = pct + "%";
}
window.addEventListener("scroll", updateReadingProgress);

renderLevelTabs();
renderStoryList();
</script>
</body>
</html>
