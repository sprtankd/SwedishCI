<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🔗 Collocation Cards — Svenska CI</title>
<meta name="description" content="Träna på partikelverb och prepositioner i naturliga svenska sammanhang för SFI C &amp; D.">
<link rel="stylesheet" href="shared.css">
<script src="gate.js"></script>
</head>
<body>
<div id="header"></div>

<main class="wrap">
  <!-- ============ SETUP VIEW ============ -->
  <section id="view-setup" class="view-enter">
    <div class="hero">
      <h1>🔗 Kollokationer</h1>
      <p class="lead">Träna på partikelverb och prepositioner i naturliga sammanhang. Bygg upp din språkkänsla inför SFI C och D.</p>
    </div>
    
    <div class="level-tabs" id="level-tabs" role="tablist">
      <!-- Tabs populated via collocations.js -->
    </div>
    
    <div class="card center mt-24" id="setup-card">
      <h2 id="setup-title" style="margin-top:0;">Starta övning</h2>
      <p class="muted" id="setup-info">Välj en nivå ovan för att börja.</p>
      <button class="btn btn-primary btn-lg mt-16" id="start-btn">Starta ▶</button>
    </div>
  </section>

  <!-- ============ GAME VIEW ============ -->
  <section id="view-game" class="hidden">
    <button class="btn btn-ghost btn-sm" id="quit-btn" type="button">← Avbryt</button>
    
    <div class="row between mt-16 mb-8">
      <span class="muted" id="game-progress-label">Kort 1 av 10</span>
      <span class="muted" id="game-score-label">Rätt: 0%</span>
    </div>
    <div class="progress mb-24"><span id="game-progress-bar"></span></div>

    <!-- Active Card -->
    <div class="card coll-card center mt-16">
      <div class="row center mb-16" style="justify-content:center;gap:8px;">
        <span class="pill" id="card-type-pill">Partikelverb</span>
        <span class="pill" id="card-level-pill">A2</span>
      </div>
      <h2 id="card-header" style="font-size:2rem;margin:12px 0 6px;">tycka ___</h2>
      <p class="muted" id="card-header-en" style="font-size:1.1rem;margin-top:0;font-style:italic;">to like</p>
      
      <p class="reading mt-24" id="card-sentence" style="font-size:1.25rem;line-height:1.75;"></p>
      <p class="muted hidden mt-8" id="card-sentence-en" style="font-size:1.02rem;"></p>

      <div class="options mt-24" id="card-options" style="display:grid;grid-template-columns:1fr;gap:12px;">
        <!-- Filled by collocations.js -->
      </div>
      
      <button class="btn btn-primary btn-lg mt-24 hidden" id="next-btn" type="button">Nästa kort →</button>
    </div>
  </section>

  <!-- ============ SUMMARY VIEW ============ -->
  <section id="view-summary" class="hidden">
    <div class="card center mt-24" style="max-width:600px;margin-left:auto;margin-right:auto;">
      <h2 style="font-size:2rem;margin-top:0;">Övning klar! 🎉</h2>
      <div class="num mt-16" id="summary-score-pct" style="font-size:3.5rem;font-weight:800;background:linear-gradient(120deg, var(--gold), var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;">0%</div>
      <p class="lead mt-16" id="summary-score-text">Du svarade rätt på 0 av 0 kort.</p>
      
      <div id="summary-mistakes-info" class="mt-16 muted" style="font-size:0.95rem;"></div>
      
      <div class="row center mt-24" style="justify-content:center;gap:12px;">
        <button class="btn btn-primary btn-lg" id="restart-btn" type="button">Öva igen</button>
        <button class="btn btn-ghost btn-lg" id="summary-quit-btn" type="button">Tillbaka till start</button>
      </div>
    </div>
  </section>
</main>

<div id="gloss-tip" class="gloss-tip" aria-hidden="true"></div>

<script src="shared.js"></script>
<script src="data/collocations.js"></script>
<script src="collocations.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
